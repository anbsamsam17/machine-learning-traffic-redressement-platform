name: CI

on: [push, pull_request]

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web
  WORKER_IMAGE: ghcr.io/${{ github.repository }}/worker

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff black mypy
      - run: ruff check apps/api/
      - run: black --check apps/api/

  lint-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd apps/web && npm ci
      - run: cd apps/web && npm run lint

  test-backend:
    runs-on: ubuntu-latest
    needs: lint-backend
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s --health-timeout 5s --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: cd apps/api && pip install ".[dev]"
      - run: cd apps/api && pytest tests/ -v --tb=short --timeout=120
        env:
          REDIS_URL: redis://localhost:6379/0
          JWT_SECRET: ci-test-secret-key-not-for-production

  build-and-push:
    runs-on: ubuntu-latest
    needs: [test-backend, lint-frontend]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # API image
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.api
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Web image
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.web
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.WEB_IMAGE }}:${{ github.sha }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Worker image
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/Dockerfile.worker
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ env.WORKER_IMAGE }}:${{ github.sha }}
            ${{ env.WORKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          echo "Deploying images tagged ${{ github.sha }}"
          echo "API:    ${{ env.API_IMAGE }}:${{ github.sha }}"
          echo "Web:    ${{ env.WEB_IMAGE }}:${{ github.sha }}"
          echo "Worker: ${{ env.WORKER_IMAGE }}:${{ github.sha }}"
          # Add your deployment commands here, e.g.:
          # ssh deploy@server "cd /opt/mdl && docker compose pull && docker compose up -d"
